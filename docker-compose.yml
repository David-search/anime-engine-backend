services:
  backend:
    build: .
    image: anime-engine-backend:latest
    container_name: ${CONTAINER_NAME:-anime-backend}
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      # Data stores (in-network container names on goongle-network):
      - MONGO_URI=${MONGO_URI:-}
      - ELASTIC_URL=${ELASTIC_URL:-}
      - ELASTIC_USER=${ELASTIC_USER:-}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-}
      - ELASTIC_INDEX=${ELASTIC_INDEX:-anime}
      # Auth (JWT signing + Google sign-in verification):
      - JWT_SECRET=${JWT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      # Telegram log shipping (optional):
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TELEGRAM_TOPIC_ID=${TELEGRAM_TOPIC_ID:-}
      - SERVER_ID=${SERVER_ID:-anime}
    restart: unless-stopped
    networks:
      - goongle-network

networks:
  goongle-network:
    external: true
