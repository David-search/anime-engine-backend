services:
  backend:
    build: .
    image: anime-engine-backend:latest
    container_name: ${CONTAINER_NAME:-anime-backend}
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      # Data stores (in-network container names on goongle-network):
      - MONGO_URI=${MONGO_URI:-}
      - ELASTIC_URL=${ELASTIC_URL:-}
      - ELASTIC_USER=${ELASTIC_USER:-}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-}
      - ELASTIC_INDEX=${ELASTIC_INDEX:-anime}
      # Auth (JWT signing + Google sign-in verification):
      - JWT_SECRET=${JWT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      # Telegram log shipping (optional):
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TELEGRAM_TOPIC_ID=${TELEGRAM_TOPIC_ID:-}
      - SERVER_ID=${SERVER_ID:-anime}
      # Self-hosted video origin (offer the ad-free cache as Source 1 when present):
      - SELFHOST_CACHE=${SELFHOST_CACHE:-0}
      - SELFHOST_ORIGIN=${SELFHOST_ORIGIN:-}
      # Optional CDN (Bunny pull-zone) in front of the origin — direct-serve the
      # heavy bytes off the proxy. Blank = proxy everything (origin IP hidden).
      - SELFHOST_CDN_BASE=${SELFHOST_CDN_BASE:-}
      - SELFHOST_INGEST_URL=${SELFHOST_INGEST_URL:-}
      - SELFHOST_INGEST_TOKEN=${SELFHOST_INGEST_TOKEN:-}
    restart: unless-stopped
    networks:
      - goongle-network

networks:
  goongle-network:
    external: true
